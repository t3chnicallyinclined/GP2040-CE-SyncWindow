name: Backfill Pico2/Pico2W to existing release

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing release tag to attach builds to (e.g. v0.7.12-nobd-20)"
        required: true
        type: string

env:
  BUILD_TYPE: Release

jobs:
  build-web:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v6.0.2
        with:
          ref: ${{ inputs.tag }}

      - name: Use Node.js
        uses: actions/setup-node@v6.3.0
        with:
          node-version: "20.x"
          cache: "npm"
          cache-dependency-path: www/package-lock.json

      - name: Install dependencies
        working-directory: ${{github.workspace}}/www
        run: npm ci

      - name: Build web UI
        working-directory: ${{github.workspace}}/www
        run: CI=false npm run build

      - name: Upload web artifact
        uses: actions/upload-artifact@v7.0.0
        with:
          name: fsData
          path: ${{github.workspace}}/lib/httpd/fsdata.c
          if-no-files-found: error

  build-firmware:
    needs: build-web
    runs-on: ubuntu-22.04
    strategy:
      matrix:
        include:
          - board: Pico2
            pico_board: pico2
          - board: Pico2W
            pico_board: pico2_w
    steps:
      - name: Setup cmake
        uses: jwlawson/actions-setup-cmake@v2
        with:
          cmake-version: "3.17.x"

      - name: Checkout
        uses: actions/checkout@v6.0.2
        with:
          ref: ${{ inputs.tag }}
          fetch-depth: 0
          fetch-tags: true

      - name: Create Pico2W board config if missing
        if: ${{ matrix.board == 'Pico2W' }}
        run: |
          if [ ! -d configs/Pico2W ]; then
            cp -r configs/Pico2 configs/Pico2W
            sed -i 's/PICO_BOARD_CONFIG_H_/PICO2W_BOARD_CONFIG_H_/' configs/Pico2W/BoardConfig.h
            sed -i 's/BOARD_CONFIG_LABEL "Pico2"/BOARD_CONFIG_LABEL "Pico2-W"/' configs/Pico2W/BoardConfig.h
          fi

      - name: Setup SDK pipeline
        uses: Fortinbra/RaspberryPiPicoBuild@v7

      - name: Download web artifact
        uses: actions/download-artifact@v8.0.1
        with:
          name: fsData
          path: ${{github.workspace}}/lib/httpd/

      - name: Get core count
        id: core_count
        run: echo "cores=$(nproc)" >> $GITHUB_OUTPUT

      - name: Configure CMake
        run: |
          PICO_SDK_PATH=${{github.workspace}}/pico-sdk \
          GP2040_BOARDCONFIG=${{ matrix.board }} \
          SKIP_WEBBUILD=TRUE \
          cmake -B ${{github.workspace}}/build \
            -DCMAKE_BUILD_TYPE=${{env.BUILD_TYPE}} \
            -DPICO_BOARD=${{ matrix.pico_board }} \
            -DPICO_PLATFORM=rp2350-arm-s

      - name: Build firmware
        run: |
          GP2040_BOARDCONFIG=${{ matrix.board }} \
          cmake --build ${{github.workspace}}/build \
            --config ${{env.BUILD_TYPE}} \
            --parallel ${{ steps.core_count.outputs.cores }}

      - name: Upload UF2
        uses: actions/upload-artifact@v7.0.0
        with:
          name: GP2040-CE-NOBD-${{ matrix.board }}
          path: ${{github.workspace}}/build/GP2040-CE-NOBD_*_${{ matrix.board }}.uf2
          if-no-files-found: error

  attach-to-release:
    needs: build-firmware
    runs-on: ubuntu-22.04
    permissions:
      contents: write
    steps:
      - name: Download all UF2 artifacts
        uses: actions/download-artifact@v8.0.1
        with:
          path: artifacts/
          pattern: GP2040-CE-NOBD-*
          merge-multiple: true

      - name: List artifacts
        run: ls -la artifacts/

      - name: Upload assets to existing release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          for f in artifacts/*.uf2; do
            echo "Uploading $f to release ${{ inputs.tag }}..."
            gh release upload "${{ inputs.tag }}" "$f" --repo "${{ github.repository }}"
          done
