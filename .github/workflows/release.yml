name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to build and release (e.g. v0.7.12-nobd-7)"
        required: true
        type: string

env:
  BUILD_TYPE: Release

jobs:
  build-web:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v6.0.2

      - name: Use Node.js
        uses: actions/setup-node@v6.3.0
        with:
          node-version: "20.x"
          cache: "npm"
          cache-dependency-path: www/package-lock.json

      - name: Install dependencies
        working-directory: ${{github.workspace}}/www
        run: npm ci

      - name: Build web UI
        working-directory: ${{github.workspace}}/www
        run: CI=false npm run build

      - name: Upload web artifact
        uses: actions/upload-artifact@v7.0.0
        with:
          name: fsData
          path: ${{github.workspace}}/lib/httpd/fsdata.c
          if-no-files-found: error

  build-firmware:
    needs: build-web
    runs-on: ubuntu-22.04
    strategy:
      matrix:
        include:
          - board: RP2040AdvancedBreakoutBoard
            cmake_extra: ""
          - board: Pico
            cmake_extra: ""
          - board: PicoW
            cmake_extra: "-DPICO_BOARD=pico_w"
          - board: WaveshareZero
            cmake_extra: ""
          # Pico2 (RP2350) removed — untested on RP2350 hardware

    steps:
      - name: Setup cmake
        uses: jwlawson/actions-setup-cmake@v2
        with:
          cmake-version: "3.17.x"

      - name: Checkout
        uses: actions/checkout@v6.0.2
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Setup SDK pipeline
        uses: Fortinbra/RaspberryPiPicoBuild@v7

      - name: Download web artifact
        uses: actions/download-artifact@v8.0.1
        with:
          name: fsData
          path: ${{github.workspace}}/lib/httpd/

      - name: Get core count
        id: core_count
        run: echo "cores=$(nproc)" >> $GITHUB_OUTPUT

      - name: Configure CMake
        run: |
          PICO_SDK_PATH=${{github.workspace}}/pico-sdk \
          GP2040_BOARDCONFIG=${{ matrix.board }} \
          SKIP_WEBBUILD=TRUE \
          cmake -B ${{github.workspace}}/build \
            -DCMAKE_BUILD_TYPE=${{env.BUILD_TYPE}} \
            ${{ matrix.cmake_extra }}

      - name: Build firmware
        run: |
          GP2040_BOARDCONFIG=${{ matrix.board }} \
          cmake --build ${{github.workspace}}/build \
            --config ${{env.BUILD_TYPE}} \
            --parallel ${{ steps.core_count.outputs.cores }}

      - name: Upload UF2
        uses: actions/upload-artifact@v7.0.0
        with:
          name: GP2040-CE-NOBD-${{ matrix.board }}
          path: ${{github.workspace}}/build/GP2040-CE-NOBD_*_${{ matrix.board }}.uf2
          if-no-files-found: error

  release:
    needs: build-firmware
    runs-on: ubuntu-22.04
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2

      - name: Download all UF2 artifacts
        uses: actions/download-artifact@v8.0.1
        with:
          path: artifacts/
          pattern: GP2040-CE-NOBD-*
          merge-multiple: true

      - name: List artifacts
        run: ls -la artifacts/

      - name: Determine tag
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "tag=${{ inputs.tag }}" >> $GITHUB_OUTPUT
          else
            echo "tag=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: "NOBD ${{ steps.tag.outputs.tag }}"
          draft: true
          generate_release_notes: true
          files: artifacts/*.uf2
